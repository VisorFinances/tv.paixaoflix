name: Preview Deploy

on:
  push:
    branches: [ develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-preview"
  cancel-in-progress: false

jobs:
  build-preview:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm ci
        
    - name: Build preview
      run: |
        cd packages/web
        npm run build
        npm run export
        
    - name: Copy data files
      run: |
        mkdir -p packages/web/out/data
        cp -r packages/web/data/* packages/web/out/data/
        
    - name: Create _redirects file
      run: |
        echo "/* /index.html 200" > packages/web/out/_redirects
        
    - name: Create .nojekyll file
      run: touch packages/web/out/.nojekyll
        
    - name: Upload preview artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: packages/web/out
        name: preview-${{ github.sha }}
        
  deploy-preview:
    environment:
      name: preview
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-preview
    
    steps:
    - name: Deploy to GitHub Pages Preview
      id: deployment
      uses: actions/deploy-pages@v4
