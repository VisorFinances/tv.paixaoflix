<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PaixãoFlix Pro Max</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --hbo-bg: #000000;
            --hbo-accent: #00e5ff; /* Azul Neon Disney+ para foco */
            --text-main: #ffffff;
            --font-main: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--hbo-bg);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* BARRA LATERAL */
        #sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 80px;
            background: rgba(0, 0, 0, 0.9);
            display: flex; flex-direction: column; align-items: center;
            padding-top: 20px; z-index: 1000; transition: width 0.3s;
        }
        #sidebar:hover { width: 220px; }
        .nav-item {
            width: 100%; padding: 20px; display: flex; align-items: center;
            color: #b3b3b3; text-decoration: none; border-left: 4px solid transparent;
        }
        .nav-item i { font-size: 1.5rem; min-width: 40px; text-align: center; }
        .nav-item span { margin-left: 20px; opacity: 0; white-space: nowrap; }
        #sidebar:hover span { opacity: 1; }

        /* FOCO GERAL (Disney+ Style) */
        .focusable:focus {
            outline: none;
            border: 4px solid var(--hbo-accent) !important;
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
            z-index: 100;
            background: rgba(255,255,255,0.1);
        }

        /* CONTEÚDO */
        #main-content { margin-left: 80px; padding: 0; }

        #hero {
            height: 70vh; width: 100%;
            background: linear-gradient(to top, #000, transparent), url('https://raw.githubusercontent.com/VisorFinances/lista-paixaoflix/refs/heads/main/hero_bg.jpg');
            background-size: cover; background-position: center;
            display: flex; align-items: flex-end; padding: 60px;
        }

        .hero-btns { display: flex; gap: 15px; margin-top: 20px; }
        .btn { padding: 12px 30px; border-radius: 4px; font-weight: bold; border: none; cursor: pointer; }
        .btn-white { background: white; color: black; }
        .btn-gray { background: rgba(255,255,255,0.2); color: white; }

        /* FILEIRAS DE FILMES */
        .content-section { padding: 20px 0 20px 60px; }
        .movie-row { 
            display: flex; gap: 20px; padding: 20px 0; 
            overflow-x: hidden; /* O JS controla o scroll */
        }

        .movie-card {
            min-width: 200px; max-width: 200px; aspect-ratio: 2/3;
            background: #1a1a1a; border-radius: 12px;
            transition: all 0.3s ease; overflow: hidden;
            border: 4px solid transparent;
        }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }

/* ESTILO DA PÁGINA DE DETALHES */
.details-pane {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; z-index: 2000;
    display: none; /* Escondido por padrão */
    color: white; animation: fadeIn 0.5s ease;
}

.details-backdrop {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-size: cover; background-position: center top;
    opacity: 0.4; filter: blur(5px);
}

.details-content {
    position: relative; z-index: 2; display: flex;
    padding: 8% 10%; align-items: center; gap: 50px;
    height: 100%; background: linear-gradient(to right, black 30%, transparent);
}

#det-poster { width: 300px; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
.details-text { max-width: 600px; }
.details-text h1 { font-size: 3.5rem; margin-bottom: 15px; }
.details-meta { margin-bottom: 20px; font-weight: bold; color: var(--hbo-accent); }
.details-btns { display: flex; gap: 20px; margin-top: 30px; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
    </style>
</head>
<body>

    <nav id="sidebar">
        <a class="nav-item focusable" href="#"><i class="fas fa-home"></i><span>Início</span></a>
        <a class="nav-item focusable" href="#"><i class="fas fa-search"></i><span>Busca</span></a>
        <a class="nav-item focusable" href="#"><i class="fas fa-film"></i><span>Filmes</span></a>
        <a class="nav-item focusable" href="#"><i class="fas fa-tv"></i><span>Séries</span></a>
    </nav>

    <main id="main-content">
        <section id="hero">
            <div class="hero-info">
                <h1>PaixãoFlix Pro</h1>
                <div class="hero-btns">
                    <button class="btn btn-white focusable">Assistir Agora</button>
                    <button class="btn btn-gray focusable">Mais Info</button>
                </div>
            </div>
        </section>

        <div class="content-section">
            <h2 style="margin-left: 20px;">Melhores de 2025</h2>
            <div class="movie-row" id="melhores-2025-row">
                </div>
        </div>
    </main>

    <script src="paixaoflix.js"></script>

 <div id="movie-details" class="details-pane">
    <div class="details-backdrop" id="det-backdrop"></div>
    <div class="details-content">
        <img id="det-poster" src="" alt="">
        <div class="details-text">
            <h1 id="det-title">Título do Filme</h1>
            <div class="details-meta">
                <span id="det-year">2025</span> • 
                <span id="det-rating">⭐ 8.5</span>
            </div>
            <p id="det-overview">Sinopse do filme aqui...</p>
            <div class="details-btns">
                <button class="btn btn-white focusable" id="btn-play-now">
                    <i class="fas fa-play"></i> Assistir Agora
                </button>
                <button class="btn btn-gray focusable" onclick="fecharDetalhes()">
                    <i class="fas fa-times"></i> Voltar
                </button>
            </div>
        </div>
    </div>
</div>   

</body>
</html>
