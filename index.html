<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaixãoFlix Pro Max</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --disney-bg: radial-gradient(circle at top, #1a1d29, #090b13);
            --disney-blue: #00e5ff;
            --text-main: #f9f9f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background: var(--disney-bg);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* BARRA LATERAL */
        #sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 80px;
            background: rgba(9, 11, 19, 0.8);
            display: flex; flex-direction: column; align-items: center;
            padding-top: 20px; z-index: 1000; transition: width 0.3s ease;
        }
        #sidebar:hover { width: 220px; background: #090b13; }
        .nav-item {
            width: 100%; padding: 20px; display: flex; align-items: center;
            color: #a8a9ad; text-decoration: none; border-left: 4px solid transparent;
            transition: 0.2s;
        }
        .nav-item i { font-size: 1.5rem; min-width: 40px; text-align: center; }
        .nav-item span { margin-left: 20px; opacity: 0; white-space: nowrap; transition: 0.3s; }
        #sidebar:hover span { opacity: 1; }

        /* FOCO DISNEY+ */
        .focusable:focus {
            outline: none;
            border: 4px solid #f9f9f9 !important;
            transform: scale(1.08);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }

        #main-content { margin-left: 80px; }

        /* HERO */
        #hero {
            height: 75vh; width: 100%;
            background: linear-gradient(to top, #090b13, transparent 50%), url('https://raw.githubusercontent.com/VisorFinances/lista-paixaoflix/refs/heads/main/hero_bg.jpg');
            background-size: cover; background-position: center;
            display: flex; align-items: flex-end; padding: 60px;
        }
        .hero-info h1 { font-size: 3.5rem; margin-bottom: 10px; }
        .hero-btns { display: flex; gap: 15px; margin-top: 20px; }
        
        .btn { 
            padding: 12px 30px; border-radius: 4px; font-weight: bold; border: none; 
            cursor: pointer; transition: 0.3s; font-size: 1rem; text-transform: uppercase;
        }
        .btn-white { background: #f9f9f9; color: #000; }
        .btn-gray { background: rgba(0,0,0,0.6); color: #f9f9f9; border: 1px solid #f9f9f9; }

        /* CARDS */
        .content-section { padding: 40px 0 20px 60px; }
        .movie-row { display: flex; gap: 20px; padding: 20px 0; overflow-x: hidden; }
        
        .movie-card {
            min-width: 200px; max-width: 200px; aspect-ratio: 2/3;
            background: #2a2d37; border-radius: 8px;
            transition: 0.3s; overflow: hidden; border: 3px solid transparent;
        }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }

       
        /* PÁGINA DE DETALHES CORRIGIDA */
.details-pane {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #090b13; z-index: 2000; display: none;
    animation: fadeIn 0.4s ease;
}

.details-backdrop {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-size: cover; 
    background-position: center 20%; /* Ajustado para mostrar melhor o rosto dos atores */
    opacity: 0.6; /* Aumentado para não ficar invisível */
}

/* Camada de cor para garantir que o texto seja legível */
.details-pane::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(to right, #090b13 30%, transparent 70%),
                linear-gradient(to top, #090b13 10%, transparent 50%);
    z-index: 1;
}

.details-content {
    position: relative; 
    z-index: 2; /* Fica acima do gradiente */
    display: flex;
    padding: 5% 8%; 
    align-items: center; 
    gap: 50px;
    height: 100%;
}

#det-poster { 
    width: 320px; 
    border-radius: 10px; 
    box-shadow: 0 0 40px rgba(0,0,0,0.9); 
    border: 1px solid rgba(255,255,255,0.2); 
}

.details-text h1 { font-size: 3.8rem; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }

.details-text p { 
    font-size: 1.2rem; 
    line-height: 1.6; 
    color: #f9f9f9; 
    opacity: 0.9; 
    margin-bottom: 30px; /* ESPAÇO DE 30PX PARA OS BOTÕES */
}

.details-btns { 
    display: flex; 
    gap: 20px; /* ESPAÇO DE 20PX ENTRE OS BOTÕES */
}
        @keyframes fadeIn { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }

/* PLAYER ESTILO VIDRO (GLASSMORPHISM) */
#video-player {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: #000; z-index: 3000; display: none;
}

#btn-close-player {
    position: absolute; top: 30px; right: 30px; z-index: 3001;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white; padding: 12px 20px; border-radius: 50px;
    cursor: pointer; font-weight: bold; transition: 0.3s;
}

#btn-close-player:focus {
    background: rgba(255, 255, 255, 0.3);
    transform: scale(1.1);
    border-color: var(--disney-blue);
}

/* GARANTIR QUE O VÍDEO NÃO TENHA BORDAS PRETAS */
#clappr-player video {
    object-fit: cover !important; /* Preenche a tela toda */
    width: 100% !important;
    height: 100% !important;
}
        
    </style>
</head>
<body>

    <nav id="sidebar">
    <a class="nav-item focusable" href="#"><i class="fas fa-home"></i><span>Início</span></a>
    <a class="nav-item focusable" href="#"><i class="fas fa-search"></i><span>Busca</span></a>
    <a class="nav-item focusable" href="#" onclick="carregarTvAoVivo()">
        <i class="fas fa-tv"></i><span>TV ao Vivo</span>
    </a>
    <a class="nav-item focusable" href="#"><i class="fas fa-film"></i><span>Filmes</span></a>
    <a class="nav-item focusable" href="#"><i class="fas fa-tv"></i><span>Séries</span></a>
</nav>

    <main id="main-content">
        <section id="hero">
            <div class="hero-info">
                <h1>PaixãoFlix Pro</h1>
                <div class="hero-btns">
                    <button class="btn btn-white focusable">Assistir Agora</button>
                    <button class="btn btn-gray focusable">Mais Info</button>
                </div>
            </div>
        </section>

        <div class="content-section">
            <h2 style="margin-left: 20px; color: #a8a9ad;">Melhores de 2025</h2>
            <div class="movie-row" id="melhores-2025-row"></div>
        </div>
    </main>

    <div id="movie-details" class="details-pane">
        <div class="details-backdrop" id="det-backdrop"></div>
        <div class="details-content">
            <img id="det-poster" src="" alt="">
            <div class="details-text">
                <h1 id="det-title">Título</h1>
                <div class="details-meta">
                    <span id="det-year">2025</span> • <span id="det-rating">⭐ 8.5</span>
                </div>
                <p id="det-overview">Carregando sinopse...</p>
                <div class="details-btns">
                    <button class="btn btn-white focusable" id="btn-play-now"><i class="fas fa-play"></i> Assistir</button>
                    <button class="btn btn-gray focusable" onclick="fecharDetalhes()"><i class="fas fa-arrow-left"></i> Voltar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="paixaoflix.js"></script>
</body>
</html>
