<script>

// Funções de navegação
function carregarPagina(pageName, content = '') {
  currentPage = pageName;
  
  // Atualizar menu ativo
  document.querySelectorAll('.sidebar-item').forEach(item => {
    item.classList.remove('active');
    if (item.dataset.page === pageName) {
      item.classList.add('active');
    }
  });
  
  // Carregar conteúdo da página
  switch(pageName) {
    case 'home':
      loadHomePage();
      break;
    case 'canaisaovivo':
      loadCanaisAoVivo();
      break;
    case 'canaiskids':
      loadCanaisKids();
      break;
    case 'cinema':
      loadCinema();
      break;
    case 'filmeskids':
      loadFilmesKids();
      break;
    case 'series':
      loadSeries();
      break;
    case 'serieskids':
      loadSeriesKids();
      break;
    case 'minha_lista':
      loadMinhaLista();
      break;
    default:
      loadHomePage();
  }
}

function loadHomePage() {
  app.innerHTML = `
    <div style="padding:30px;">
      <h2 style="color:var(--gold);margin-bottom:20px;">🎬 Bem-vindo ao PaixãoFlix</h2>
      <div class="content-grid" id="featuredContent">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  `;
  loadFeaturedContent();
}

async function loadFeaturedContent() {
  try {
    // Carregar conteúdo em destaque de múltiplas fontes
    const [cinema, series] = await Promise.all([
      fetchJSON('/data/cinema.json'),
      fetchJSON('/data/séries.json')
    ]);
    
    const featured = [...(cinema || []), ...(series || [])].slice(0, 12);
    renderContentGrid('featuredContent', featured);
  } catch (error) {
    console.error('Erro ao carregar conteúdo em destaque:', error);
    document.getElementById('featuredContent').innerHTML = 
      '<p style="color:var(--text-secondary);text-align:center;">Erro ao carregar conteúdo. Tente novamente.</p>';
  }
}

function renderContentGrid(containerId, items) {
  const container = document.getElementById(containerId);
  if (!container) return;
  
  if (!items || items.length === 0) {
    container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;">Nenhum conteúdo encontrado.</p>';
    return;
  }
  
  container.innerHTML = items.map(item => `
    <div class="content-card" onclick="playContent('${item.type}', '${item.identificador_archive || item.url || item.tmdb_id}')">
      <img src="${item.poster || 'https://via.placeholder.com/180x270/1a1a2e/ffffff?text=Sem+Poster'}" 
           alt="${item.titulo}" class="poster" 
           onerror="this.src='https://via.placeholder.com/180x270/1a1a2e/ffffff?text=Erro'">
      <div class="info">
        <div class="titulo">${item.titulo}</div>
        <div class="meta">
          <span>${item.year || 'N/A'}</span>
          <span>⭐ ${item.rating || 'N/A'}</span>
        </div>
      </div>
    </div>
  `).join('');
}

// Funções específicas para cada página

// Funções utilitárias
async function fetchJSON(url) {
  const response = await fetch(url);
  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  return await response.json();
}

async function fetchText(url) {
  const response = await fetch(url);
  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  return await response.text();
}

function parseM3U(m3uContent) {
  const lines = m3uContent.split('\n');
  const channels = [];
  
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (line.startsWith('#EXTINF:')) {
      const titleMatch = line.match(/,(.+)$/);
      const logoMatch = line.match(/tvg-logo="([^"]+)"/);
      const groupMatch = line.match(/group-title="([^"]+)"/);
      
      if (titleMatch && lines[i + 1]) {
        channels.push({
          title: titleMatch[1],
          logo: logoMatch ? logoMatch[1] : '',
          group: groupMatch ? groupMatch[1] : '',
          url: lines[i + 1].trim()
        });
      }
    }
  }
  
  return channels;
}

function renderCanaisList(channels, title = 'Canais ao Vivo') {
  const channelsHtml = channels.map(channel => `
    <div class="content-card" onclick="playChannel('${channel.url}', '${channel.title}')">
      <img src="${channel.logo || 'https://via.placeholder.com/180x270/1a1a2e/ffffff?text=TV'}" 
           alt="${channel.title}" class="poster">
      <div class="info">
        <div class="titulo">${channel.title}</div>
        <div class="meta">
          <span>${channel.group}</span>
          <span>🔴 AO VIVO</span>
        </div>
      </div>
    </div>
  `).join('');
  
  app.innerHTML = `
    <div style="padding:30px;">
      <h2 style="color:var(--gold);margin-bottom:20px;">📺 ${title}</h2>
      <div class="content-grid">
        ${channelsHtml}
      </div>
    </div>
  `;
}

// Player avançado
function abrirPlayer(url, title = 'PaixãoFlix Player') {
  overlay.style.display = "flex";
  playerTitle.textContent = title;
  player.src = url;
  player.play();
  
  // Configurar player para streaming
  player.crossOrigin = "anonymous";
  player.preload = "auto";
  
  // Adicionar listeners para qualidade adaptativa
  player.addEventListener('error', handlePlayerError);
  player.addEventListener('loadstart', handlePlayerLoadStart);
  player.addEventListener('canplay', handlePlayerCanPlay);
}

function playContent(type, identifier) {
  if (type === 'movie' && identifier.startsWith('http')) {
    // URL direta para filme
    abrirPlayer(identifier, 'Filme - PaixãoFlix');
  } else if (identifier) {
    // Identificador do archive.org
    const archiveUrl = `https://archive.org/metadata/${identifier}`;
    fetch(archiveUrl)
      .then(response => response.json())
      .then(data => {
        if (data && data.files) {
          // Encontrar o arquivo de vídeo principal
          const videoFile = Object.values(data.files).find(file => 
            file.format && (file.format.includes('mp4') || file.format.includes('MPEG4'))
          );
          if (videoFile) {
            const videoUrl = `https://archive.org/download/${identifier}/${videoFile.name}`;
            abrirPlayer(videoUrl, data.metadata?.title || 'PaixãoFlix');
          }
        }
      })
      .catch(error => {
        console.error('Erro ao carregar do archive.org:', error);
        alert('Erro ao carregar conteúdo. Tente novamente.');
      });
  }
}

function playChannel(url, title) {
  abrirPlayer(url, title);
}

function handlePlayerError(e) {
  console.error('Erro no player:', e);
  const errorText = player.error ? player.error.message : 'Erro desconhecido';
  alert(`Erro ao reproduzir: ${errorText}`);
}

function handlePlayerLoadStart() {
  console.log('Carregando mídia...');
}

function handlePlayerCanPlay() {
  console.log('Mídia pronta para reprodução');
}

function sairPlayer() {
  player.pause();
  player.src = '';
  overlay.style.display = "none";
}

// Busca
function performSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;
  
  searchQuery = query;
  app.innerHTML = `
    <div style="padding:30px;">
      <h2 style="color:var(--gold);margin-bottom:20px;">🔍 Resultados para: "${query}"</h2>
      <div class="loading">
        <div class="spinner"></div>
      </div>
    </div>
  `;
  
  // Implementar busca global
  searchGlobalContent(query);
}

async function searchGlobalContent(query) {
  try {
    const [cinema, series] = await Promise.all([
      fetchJSON('/data/cinema.json'),
      fetchJSON('/data/séries.json')
    ]);
    
    const allContent = [...(cinema || []), ...(series || [])];
    const results = allContent.filter(item => 
      item.titulo && item.titulo.toLowerCase().includes(query.toLowerCase())
    );
    
    if (results.length > 0) {
      app.innerHTML = `
        <div style="padding:30px;">
          <h2 style="color:var(--gold);margin-bottom:20px;">🔍 Resultados para: "${query}" (${results.length})</h2>
          <div class="content-grid" id="searchResults">
            ${results.map(item => `
              <div class="content-card" onclick="playContent('${item.type}', '${item.identificador_archive || item.url || item.tmdb_id}')">
                <img src="${item.poster || 'https://via.placeholder.com/180x270/1a1a2e/ffffff?text=Sem+Poster'}" 
                     alt="${item.titulo}" class="poster">
                <div class="info">
                  <div class="titulo">${item.titulo}</div>
                  <div class="meta">
                    <span>${item.year || 'N/A'}</span>
                    <span>⭐ ${item.rating || 'N/A'}</span>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    } else {
      app.innerHTML = `
        <div style="padding:30px;">
          <h2 style="color:var(--gold);margin-bottom:20px;">🔍 Resultados para: "${query}"</h2>
          <p style="color:var(--text-secondary);text-align:center;">Nenhum resultado encontrado.</p>
        </div>
      `;
    }
  } catch (error) {
    app.innerHTML = '<p style="color:var(--text-secondary);text-align:center;">Erro na busca.</p>';
  }
}

// Funções utilitárias da interface
function toggleFullscreen() {
  if (!document.fullscreenElement) {

  } else {

});

// Atalhos de teclado
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && overlay.style.display === 'flex') {
    sairPlayer();
  }
  if (e.key === 'f' && e.ctrlKey) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

  grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
  gap:20px;
  padding:20px;
}

/* Menu lateral aprimorado */
#sidebar{
  position:fixed;
  top:0;
  left:0;
  width:90px;
  height:100vh;
  background:linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 0;
  z-index:1000;
  box-shadow:2px 0 20px rgba(0,0,0,0.5);
}
.sidebar-item{
  width:60px;
  height:60px;
  margin:10px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  cursor:pointer;
  transition:var(--transition);
  color:var(--text-secondary);
  text-decoration:none;
  font-size:10px;
  position:relative;
}
.sidebar-item:hover{
  background:var(--bg-hover);
  color:var(--text-primary);
  transform:translateX(5px);
}
.sidebar-item.active{
  background:var(--accent);
  color:var(--text-primary);
}
.sidebar-item i{
  font-size:24px;
  margin-bottom:4px;
}

/* Header melhorado */
#header{
  position:fixed;
  top:0;
  left:90px;
  height:70px;
  width:calc(100% - 90px);
  background:linear-gradient(90deg, var(--bg-primary) 0%, rgba(26,26,46,0.9) 100%);
  backdrop-filter:blur(20px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 30px;
  z-index:999;
  box-shadow:0 2px 20px rgba(0,0,0,0.3);
}

/* Busca global */
#buscaGlobal{
  position:fixed;
  top:70px;
  left:90px;
  width:calc(100% - 90px);
  height:60px;
  background:rgba(26,26,46,0.95);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  padding:0 30px;
  z-index:998;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.search-box{
  position:relative;
  width:100%;
  max-width:500px;
}
.search-box input{
  width:100%;
  padding:12px 45px 12px 20px;
  border:2px solid rgba(255,255,255,0.1);
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  color:var(--text-primary);
  font-size:14px;
  transition:var(--transition);
}
.search-box input:focus{
  outline:none;
  border-color:var(--accent);
  background:rgba(255,255,255,0.1);
}
.search-box button{
  position:absolute;
  right:5px;
  top:50%;
  transform:translateY(-50%);
  width:36px;
  height:36px;
  border-radius:50%;
  background:var(--accent);
  color:white;
  border:none;
  cursor:pointer;
  transition:var(--transition);
}

/* Player overlay premium */
#playerOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:rgba(0,0,0,0.95);
  z-index:9999;
  display:none;
  flex-direction:column;
}
.player-header{
  height:70px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 30px;
  background:linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
}
.player-content{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
#player{
  width:100%;
  max-width:1200px;
  height:70vh;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}

/* Botões 3D premium */
.btn-3d{
  background:linear-gradient(145deg, var(--accent), var(--accent-hover));
  color:white;
  padding:14px 28px;
  border-radius:var(--radius);
  border:none;
  cursor:pointer;
  font-weight:600;
  font-size:14px;
  box-shadow:0 6px 0 var(--accent-hover), 0 12px 20px rgba(0,0,0,0.3);
  transition:var(--transition);
  position:relative;
  top:0;
}
.btn-3d:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 0 var(--accent-hover), 0 16px 25px rgba(0,0,0,0.4);
}
.btn-3d:active{
  transform:translateY(4px);
  box-shadow:0 2px 0 var(--accent-hover), 0 4px 10px rgba(0,0,0,0.2);
}

/* Loading spinner */
.loading{
  display:flex;
  justify-content:center;
  align-items:center;
  height:200px;
}
.spinner{
  width:50px;
  height:50px;
  border:3px solid rgba(255,255,255,0.1);
  border-top:3px solid var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* Responsividade */
@media(max-width:768px){
  #sidebar{width:70px;}
  #header{left:70px;width:calc(100% - 70px);}
  #buscaGlobal{left:70px;width:calc(100% - 70px);}
  #app{left:70px;width:calc(100% - 70px);}
  .content-grid{grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));gap:15px;padding:15px;}
}
</style>
