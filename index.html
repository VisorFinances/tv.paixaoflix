<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaixãoFlix - Streaming de Alta Performance</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Helvetica Neue', sans-serif;
            background: #141414;
            color: #ffffff;
            overflow-x: hidden;
            cursor: default;
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar {
            display: none;
        }

        html {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Hide cursor after 3s inactivity */
        body.hide-cursor {
            cursor: none;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(180deg, rgba(20,20,20,0.9) 0%, rgba(20,20,20,0) 100%);
            padding: 15px 20px 15px 20px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            transition: all 0.3s ease;
            height: 60px;
        }

        .logo {
            width: 140px;
            height: auto;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
            z-index: 1002;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-item {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
        }

        .nav-item:hover {
            color: #e50914;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 60px;
            bottom: 0;
            width: 40px;
            background: rgba(20,20,20,0.95);
            z-index: 998;
            transition: width 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .sidebar:hover {
            width: 180px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #ffffff;
            text-decoration: none;
            transition: background 0.2s;
            white-space: nowrap;
            font-size: 16px;
            font-weight: 500;
        }

        .sidebar-item:hover {
            background: rgba(229,9,20,0.1);
        }

        .sidebar-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        /* Main Content */
        .main-content {
            margin-left: 40px;
            margin-right: 60px;
            padding-top: 80px;
            min-height: 100vh;
        }

        /* Banner */
        .banner {
            width: calc(100% - 100px);
            height: calc(70vh + 20px);
            position: relative;
            margin-bottom: 60px;
            overflow: hidden;
            z-index: 999;
            margin-left: 60px;
            margin-top: 0;
            padding-top: 0;
            border-radius: 8px;
        }

        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 1s ease-in-out;
        }

        .banner-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(20,20,20,0) 0%, rgba(20,20,20,0.8) 100%);
            padding: 60px;
        }

        .banner-title {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #ffffff;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.7);
            letter-spacing: -1px;
            max-width: 80%;
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            white-space: normal;
            line-height: 1.1;
        }

        .banner-description {
            font-size: 22px;
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 600px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .banner-buttons {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: #ffffff;
            color: #141414;
        }

        .btn-primary:hover {
            background: #e0e0e0;
        }

        .btn-secondary {
            background: rgba(109,109,110,0.7);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            background: rgba(109,109,110,0.9);
        }

        /* Sections */
        .section {
            margin-bottom: 80px;
            padding: 0 60px;
        }

        .section-title {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.2;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: -0.5px;
        }

        .section-subtitle {
            font-size: 20px;
            color: #b3b3b3;
            margin-bottom: 40px;
            line-height: 1.4;
        }

        /* Carousel */
        .carousel {
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .carousel-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }

        .carousel-container::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .carousel-item {
            flex: 0 0 calc(20% - 9.6px);
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
            border-radius: 8px;
            overflow: hidden;
            width: 600px;
            max-width: 600px;
            min-width: 400px;
            height: 900px;
            max-height: 900px;
            min-height: 600px;
            aspect-ratio: 2/3;
        }

        .carousel-item:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .carousel-item-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(20,20,20,0) 0%, rgba(20,20,20,0.9) 100%);
            padding: 25px 18px 18px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .carousel-item:hover .carousel-item-overlay {
            opacity: 1;
        }

        .carousel-item-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.2;
            color: #ffffff;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
        }

        .carousel-item-year {
            font-size: 16px;
            color: #b3b3b3;
        }

        /* Continue Watching */
        .continue-watching .carousel-item {
            aspect-ratio: 16/9;
            width: 1280px;
            max-width: 1280px;
            height: 720px;
            max-height: 720px;
        }

        .continue-watching .carousel-item img {
            width: 1280px;
            height: 720px;
            object-fit: cover;
            object-position: center;
        }

        /* Mobile Continue Watching */
        @media (max-width: 768px) {
            .continue-watching .carousel-item {
                width: calc(100vw - 40px);
                max-width: calc(100vw - 40px);
                height: calc((100vw - 40px) * 9 / 16);
                max-height: calc((100vw - 40px) * 9 / 16);
            }

            .continue-watching .carousel-item img {
                width: calc(100vw - 40px);
                height: calc((100vw - 40px) * 9 / 16);
            }
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(255,255,255,0.3);
        }

        .progress-fill {
            height: 100%;
            background: #e50914;
            transition: width 0.3s ease;
        }

        /* Focusable elements for Smart TV navigation */
        .focusable {
            outline: none;
        }

        /* Player */
        .player-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000000;
            z-index: 2000;
            display: none;
        }

        .player-container.active {
            display: block;
        }

        .player-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(20,20,20,0.9) 0%, rgba(20,20,20,0) 100%);
            padding: 20px 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 2001;
        }

        .close-player {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 28px;
            cursor: pointer;
            padding: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 10px 20px;
                height: 50px;
            }

            .logo {
                width: 120px;
            }

            .sidebar {
                left: 0;
                top: 50px;
                width: 40px;
            }

            .main-content {
                margin-left: 0;
                margin-right: 20px;
                padding-top: 70px;
            }

            .banner {
                width: 100%;
                margin-left: 0;
            }

            .section {
                padding: 0 20px;
                margin-bottom: 60px;
            }

            .section-title {
                font-size: 28px;
                margin-bottom: 20px;
                color: #ffffff;
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
                letter-spacing: -0.5px;
            }

            .section-subtitle {
                font-size: 18px;
                margin-bottom: 30px;
            }

            .carousel-item {
                flex: 0 0 calc(50% - 6px);
                width: 400px;
                max-width: 400px;
                min-width: 300px;
                height: 600px;
                max-height: 600px;
                min-height: 450px;
                aspect-ratio: 2/3;
            }

            .carousel-item img {
                height: 100%;
            }

            .carousel-item-title {
                font-size: 16px;
                margin-bottom: 5px;
                color: #ffffff;
                text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
                word-wrap: break-word;
                overflow-wrap: break-word;
                hyphens: auto;
            }

            .carousel-item-year {
                font-size: 14px;
            }

            .banner-overlay {
                padding: 30px 20px;
            }

            .banner-title {
                font-size: 40px;
                color: #ffffff;
                text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.7);
                letter-spacing: -1px;
                max-width: 80%;
                word-wrap: break-word;
                overflow-wrap: break-word;
                hyphens: auto;
                white-space: normal;
                line-height: 1.1;
            }

            .banner-description {
                font-size: 18px;
            }

            .btn {
                padding: 12px 24px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
