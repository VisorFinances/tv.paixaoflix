<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaixãoFlix Pro Max</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #05070a;
            --bg-accent: #0f111a;
            --disney-blue: #00e5ff;
            --glass: rgba(255, 255, 255, 0.05);
            --text-main: #f9f9f9;
            --shadow-3d: 0 4px 0 #0097a7, 0 8px 15px rgba(0,0,0,0.4);
        }

        /* REMOVER BARRAS DE ROLAGEM MANTENDO O SCROLL */
        * { margin: 0; padding: 0; box-sizing: border-box; scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* BARRA LATERAL PROFISSIONAL */
        #sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 80px;
            background: var(--bg-accent);
            display: flex; flex-direction: column; z-index: 1000;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        #sidebar:hover { width: 220px; }
        .nav-item {
            width: 100%; padding: 22px 28px; display: flex; align-items: center;
            color: #888; text-decoration: none; transition: 0.3s;
        }
        .nav-item i { font-size: 1.4rem; min-width: 30px; }
        .nav-item span { margin-left: 20px; opacity: 0; transition: 0.3s; }
        #sidebar:hover span { opacity: 1; }

        /* BOTÕES 3D PROFISSIONAIS */
        .btn-3d {
            padding: 12px 25px; border-radius: 6px; border: none; font-weight: bold;
            cursor: pointer; transition: all 0.2s; text-transform: uppercase;
            background: var(--disney-blue); color: #000;
            box-shadow: var(--shadow-3d);
            display: flex; align-items: center; gap: 8px;
        }
        .btn-3d:active { transform: translateY(4px); box-shadow: none; }
        .btn-3d:focus { outline: 3px solid #fff; }

        /* FOCO ELEGANTE */
        .focusable:focus {
            outline: none; transform: scale(1.08);
            box-shadow: 0 0 0 4px #fff, 0 15px 30px rgba(0,0,0,0.8);
            z-index: 100;
        }

        /* TV AO VIVO - BARRA LATERAL */
        .channels-sidebar {
            position: absolute; left: 0; top: 0; width: 350px; height: 100%;
            background: rgba(5, 7, 10, 0.95); backdrop-filter: blur(20px);
            z-index: 3005; transform: translateX(-100%); transition: 0.4s;
            border-right: 1px solid var(--disney-blue);
        }
        .channels-sidebar.active { transform: translateX(0); }
        .channel-item {
            padding: 15px; margin: 10px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; gap: 15px; background: var(--glass);
            border: 2px solid transparent; transition: 0.2s;
        }
        .channel-item:focus { border-color: var(--disney-blue); background: rgba(0, 229, 255, 0.1); }

        /* LAYOUT FILMES */
        #categories-page { display: none; padding: 40px 0 40px 100px; }
        .movie-row { display: flex; gap: 20px; padding: 20px 0; overflow-x: auto; }
        .movie-card { min-width: 180px; aspect-ratio: 2/3; border-radius: 8px; overflow: hidden; background: #111; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <a class="nav-item focusable" href="#" onclick="window.location.reload()"><i class="fas fa-home"></i><span>Início</span></a>
        <a class="nav-item focusable" href="#" onclick="carregarFilmes()"><i class="fas fa-film"></i><span>Filmes</span></a>
        <a class="nav-item focusable" href="#" onclick="carregarTvAoVivo()"><i class="fas fa-satellite-dish"></i><span>TV ao Vivo</span></a>
    </nav>

    <main id="main-content">
        <section id="hero" style="height: 70vh; padding: 100px; display: flex; align-items: flex-end;">
            <div class="hero-info">
                <h1 style="font-size: 4rem;">PaixãoFlix</h1>
                <p style="max-width: 600px; margin: 20px 0;">Sua plataforma profissional de streaming.</p>
                <button class="btn-3d focusable"><i class="fas fa-play"></i> Assistir Agora</button>
            </div>
        </section>
    </main>

    <div id="categories-page">
        <h1 id="page-title">Filmes</h1>
        <div id="dynamic-rows"></div>
    </div>

    <div id="video-player" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:3000; background:#000;">
        <div id="clappr-player" style="width:100%; height:100%;"></div>
        
        <div id="live-channels-list" class="channels-sidebar">
            <h2 style="padding: 20px; color: var(--disney-blue);">Canais Live</h2>
            <div id="channels-container"></div>
        </div>
        
        <button id="btn-close-player" class="btn-3d focusable" onclick="fecharPlayer()" style="position:absolute; top:30px; right:30px; z-index:4000;">SAIR</button>
    </div>

    <div id="movie-details" class="details-pane" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:2000; background: var(--bg-deep);">
        <div id="det-content" style="padding: 100px; display: flex; gap: 50px;">
            <img id="det-poster" style="width: 300px; border-radius: 10px;">
            <div class="det-info">
                <h1 id="det-title" style="font-size: 3.5rem;"></h1>
                <p id="det-desc" style="margin: 20px 0; font-size: 1.2rem;"></p>
                <div class="det-btns" style="display:flex; gap:15px;">
                    <button id="btn-play-video" class="btn-3d focusable"><i class="fas fa-play"></i> Assistir</button>
                    <button id="btn-trailer" class="btn-3d focusable" style="background:#444; color:#fff; box-shadow: 0 4px 0 #222;"><i class="fas fa-video"></i> Trailer</button>
                    <button class="btn-3d focusable" onclick="fecharDetalhes()" style="background:#666; color:#fff; box-shadow: 0 4px 0 #333;">Voltar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="paixaoflix.js"></script>
</body>
</html>
