function carregarPagina(pageName, content = '') {
  currentPage = pageName;
  console.log('🚀 Carregando página:', pageName);
  
  // Atualizar menu ativo
  document.querySelectorAll('.sidebar-item').forEach(item => {
    item.classList.remove('active');
    if (item.dataset.page === pageName) {
      item.classList.add('active');
      console.log('✅ Menu ativo:', item.querySelector('span').textContent);
    }
  });
  
  // Carregar conteúdo da página
  switch(pageName) {
    case 'home':
      loadHomePage();
      break;
    case 'canaisaovivo':
      loadCanaisAoVivo();
      break;
    case 'canaiskids':

    case 'cinema':

    case 'filmeskids':

    case 'search':

      break;
    default:

      loadHomePage();
  }
}

function performSearch() {
  const searchInput = document.getElementById('searchInput');
  const query = searchInput.value.trim().toLowerCase();
  
  if (!query) {
    document.getElementById('searchResults').innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--cinza);">
        <div style="font-size:4rem;margin-bottom:20px;">🔍</div>
        <h3 style="margin-bottom:10px;">Digite algo para pesquisar</h3>
        <p>Use o campo acima para encontrar filmes, séries ou canais.</p>
      </div>
    `;
    return;
  }
  
  // Mostrar loading
  document.getElementById('searchResults').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
    </div>
  `;
  
  // Carregar todos os dados e filtrar
  Promise.all([
    fetchJSON('/data/cinema.json'),
    fetchJSON('/data/séries.json'),
    fetchJSON('/data/filmeskids.json'),
    fetchJSON('/data/sérieskids.json'),
    fetchM3U('/data/canaisaovivo.m3u'),
    fetchM3U('/data/canaiskids.m3u')
  ]).then(([cinema, series, filmesKids, seriesKids, canais, canaisKids]) => {
    const allContent = [
      ...(cinema || []),
      ...(series || []),
      ...(filmesKids || []),
      ...(seriesKids || []),
      ...(canais || []),
      ...(canaisKids || [])
    ];
    
    // Filtrar resultados
    const results = allContent.filter(item => {
      const title = (item.title || item.name || '').toLowerCase();
      const description = (item.description || '').toLowerCase();
      const genre = (item.genero || '').toLowerCase();
      
      return title.includes(query) || 
             description.includes(query) || 
             genre.includes(query);
    });
    
    // Renderizar resultados
    if (results.length === 0) {
      document.getElementById('searchResults').innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--cinza);">
          <div style="font-size:4rem;margin-bottom:20px;">😔</div>
          <h3 style="margin-bottom:10px;">Nenhum resultado encontrado</h3>
          <p>Tente buscar com outros termos ou verifique a ortografia.</p>
        </div>
      `;
    } else {
      renderContentGrid('searchResults', results);
    }
    
  }).catch(error => {
    console.error('❌ Erro na pesquisa:', error);
    document.getElementById('searchResults').innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--cinza);">
        <div style="font-size:4rem;margin-bottom:20px;">⚠️</div>
        <h3 style="margin-bottom:10px;">Erro na pesquisa</h3>
        <p>Não foi possível realizar a busca. Tente novamente.</p>
      </div>
    `;
  });
}

  app.innerHTML = `

      <div style="display:flex;gap:15px;margin-bottom:30px;">

async function loadHomeSections() {
  try {

    const [cinema, series, filmesKids, seriesKids] = await Promise.all([

// Funções utilitárias
async function fetchJSON(url) {
  try {
    console.log('📦 Buscando JSON:', url);
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    const data = await response.json();
    console.log('✅ JSON carregado:', data?.length || 'sem dados');
    return data;
  } catch (error) {
    console.error('❌ Erro ao buscar JSON:', url, error);
    return [];
  }
}

async function fetchText(url) {
  const response = await fetch(url);
  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  return await response.text();
}

function parseM3U(m3uContent) {
  const lines = m3uContent.split('\n');
  const channels = [];
  
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (line.startsWith('#EXTINF:')) {
      const titleMatch = line.match(/,(.+)$/);
      const logoMatch = line.match(/tvg-logo="([^"]+)"/);
      const groupMatch = line.match(/group-title="([^"]+)"/);
      
      if (titleMatch && lines[i + 1]) {
        channels.push({
          title: titleMatch[1],
          logo: logoMatch ? logoMatch[1] : '',
          group: groupMatch ? groupMatch[1] : '',
          url: lines[i + 1].trim()
        });
      }
    }
  }
  
  return channels;
}

function playContent(type, identifier) {
  if (type === 'movie' && identifier.startsWith('http')) {
    // URL direta para filme
    abrirPlayer(identifier, 'Filme - PaixãoFlix');
  } else if (identifier) {
    // Identificador do archive.org
    const archiveUrl = `https://archive.org/metadata/${identifier}`;
    fetch(archiveUrl)
      .then(response => response.json())
      .then(data => {
        if (data && data.files) {
          // Encontrar o arquivo de vídeo principal
          const videoFile = Object.values(data.files).find(file => 
            file.format && (file.format.includes('mp4') || file.format.includes('MPEG4'))
          );
          if (videoFile) {
            const videoUrl = `https://archive.org/download/${identifier}/${videoFile.name}`;
            abrirPlayer(videoUrl, data.metadata?.title || 'PaixãoFlix');
          }
        }
      })
      .catch(error => {
        console.error('Erro ao carregar do archive.org:', error);
        alert('Erro ao carregar conteúdo. Tente novamente.');
      });
  }
}

}

  console.log('🚪 Player fechado');
}

async function searchGlobalContent(query) {
  try {
    const [cinema, series] = await Promise.all([
      fetchJSON('/data/cinema.json'),
      fetchJSON('/data/séries.json')
    ]);
    
    const allContent = [...(cinema || []), ...(series || [])];
    const results = allContent.filter(item => 
      item.titulo && item.titulo.toLowerCase().includes(query.toLowerCase())
    );
    
    if (results.length > 0) {
      app.innerHTML = `
        <div style="padding:30px;">
          <h2 style="color:var(--gold);margin-bottom:20px;">🔍 Resultados para: "${query}" (${results.length})</h2>
          <div class="content-grid" id="searchResults">
            ${results.map(item => `
              <div class="content-card" onclick="playContent('${item.type}', '${item.identificador_archive || item.url || item.tmdb_id}')">
                <img src="${item.poster || 'https://picsum.photos/180/270?random=5'}" 
                     alt="${item.titulo}" class="poster"
                     onerror="this.src='https://picsum.photos/180/270?random=6'">
                <div class="info">
                  <div class="titulo">${item.titulo}</div>
                  <div class="meta">
                    <span>${item.year || 'N/A'}</span>
                    <span>⭐ ${item.rating || 'N/A'}</span>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    } else {
      app.innerHTML = `
        <div style="padding:30px;">
          <h2 style="color:var(--gold);margin-bottom:20px;">🔍 Resultados para: "${query}"</h2>
          <p style="color:var(--text-secondary);text-align:center;">Nenhum resultado encontrado.</p>
        </div>
      `;
    }
  } catch (error) {
    app.innerHTML = '<p style="color:var(--text-secondary);text-align:center;">Erro na busca.</p>';
  }
}

  transition:var(--transition);
  color:var(--text-secondary);
  text-decoration:none;
  font-size:10px;
  position:relative;
}
.sidebar-item:hover{
  background:var(--bg-hover);
  color:var(--text-primary);
  transform:translateX(5px);
}
.sidebar-item.active{
  background:var(--accent);
  color:var(--text-primary);
}
.sidebar-item i{
  font-size:24px;
  margin-bottom:4px;
}

/* Header melhorado */
#header{
  position:fixed;
  top:0;
  left:90px;
  height:70px;
  width:calc(100% - 90px);
  background:linear-gradient(90deg, var(--bg-primary) 0%, rgba(26,26,46,0.9) 100%);
  backdrop-filter:blur(20px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 30px;
  z-index:999;
  box-shadow:0 2px 20px rgba(0,0,0,0.3);
}

/* Busca global */
#buscaGlobal{
  position:fixed;
  top:70px;
  left:90px;
  width:calc(100% - 90px);
  height:60px;
  background:rgba(26,26,46,0.95);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  padding:0 30px;
  z-index:998;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.search-box{
  position:relative;
  width:100%;
  max-width:500px;
}
.search-box input{
  width:100%;
  padding:12px 45px 12px 20px;
  border:2px solid rgba(255,255,255,0.1);
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  color:var(--text-primary);
  font-size:14px;
  transition:var(--transition);
}
.search-box input:focus{
  outline:none;
  border-color:var(--accent);
  background:rgba(255,255,255,0.1);
}
.search-box button{
  position:absolute;
  right:5px;
  top:50%;
  transform:translateY(-50%);
  width:36px;
  height:36px;
  border-radius:50%;
  background:var(--accent);
  color:white;
  border:none;
  cursor:pointer;
  transition:var(--transition);
}

/* Player overlay premium */
#playerOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:rgba(0,0,0,0.95);
  z-index:9999;
  display:none;
  flex-direction:column;
}
.player-header{
  height:70px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 30px;
  background:linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
}
.player-content{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
#player{
  width:100%;
  max-width:1200px;
  height:70vh;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}

/* Botões 3D premium */
.btn-3d{
  background:linear-gradient(145deg, var(--accent), var(--accent-hover));
  color:white;
  padding:14px 28px;
  border-radius:var(--radius);
  border:none;
  cursor:pointer;
  font-weight:600;
  font-size:14px;
  box-shadow:0 6px 0 var(--accent-hover), 0 12px 20px rgba(0,0,0,0.3);
  transition:var(--transition);
  position:relative;
  top:0;
}
.btn-3d:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 0 var(--accent-hover), 0 16px 25px rgba(0,0,0,0.4);
}
.btn-3d:active{
  transform:translateY(4px);
  box-shadow:0 2px 0 var(--accent-hover), 0 4px 10px rgba(0,0,0,0.2);
}

/* Hero Banner */
.hero-banner{
  position:relative;
  height:70vh;
  min-height:400px;
  border-radius:var(--radius);
  overflow:hidden;
  margin-bottom:40px;
  background:linear-gradient(135deg, var(--bg2), var(--bg));
}

.hero-backdrop{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  filter:brightness(0.4);
  z-index:1;
}

.hero-content{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:60px;
  color:white;
}

.hero-title{
  font-size:3.5rem;
  font-weight:bold;
  margin-bottom:20px;
  text-shadow:2px 2px 4px rgba(0,0,0,0.8);
  max-width:600px;
}

.hero-description{
  font-size:1.2rem;
  margin-bottom:30px;
  line-height:1.6;
  max-width:500px;
  opacity:0.9;
}

.hero-buttons{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.btn-hero{
  padding:15px 30px;
  border:none;
  border-radius:var(--radius);
  font-size:1.1rem;
  font-weight:bold;
  cursor:pointer;
  transition:var(--transition);
  text-transform:uppercase;
  letter-spacing:1px;
}

.btn-play{
  background:var(--amarelo);
  color:var(--bg);
}

.btn-play:hover{
  background:var(--azul);
  color:white;
  transform:scale(1.05);
}

.btn-info{
  background:rgba(255,255,255,0.2);
  color:white;
  border:2px solid rgba(255,255,255,0.5);
}

.btn-info:hover{
  background:rgba(255,255,255,0.3);
  transform:scale(1.05);
}

/* Content Sections */
.content-sections{
  display:flex;
  flex-direction:column;
  gap:40px;
}

.content-section{
  margin-bottom:20px;
}

.section-title{
  color:var(--amarelo);
  font-size:1.8rem;
  font-weight:bold;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:10px;
}

.section-title::before{
  content:'';
  height:3px;
  width:40px;
  background:var(--amarelo);
  border-radius:2px;
}

/* Loading spinner */
.loading{
  display:flex;
  justify-content:center;
  align-items:center;
  height:200px;
}
.spinner{
  width:50px;
  height:50px;
  border:3px solid rgba(255,255,255,0.1);
  border-top:3px solid var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* Responsividade */
@media(max-width:768px){
  #sidebar{width:70px;}
  #header{left:70px;width:calc(100% - 70px);}
  #buscaGlobal{left:70px;width:calc(100% - 70px);}
  #app{left:70px;width:calc(100% - 70px);}
  .content-grid{grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));gap:15px;padding:15px;}
}
