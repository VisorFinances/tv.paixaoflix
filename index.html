    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap');

        @tailwind base;
        @tailwind components;
        @tailwind utilities;

        @layer base {
          :root {
            --background: 0 0% 8%;
            --foreground: 0 0% 95%;

            --card: 0 0% 11%;
            --card-foreground: 0 0% 95%;

            --popover: 0 0% 11%;
            --popover-foreground: 0 0% 95%;

            --primary: 0 85% 50%;
            --primary-foreground: 0 0% 100%;

            --secondary: 0 0% 16%;
            --secondary-foreground: 0 0% 90%;

            --muted: 0 0% 18%;
            --muted-foreground: 0 0% 55%;

            --accent: 0 0% 20%;
            --accent-foreground: 0 0% 95%;

            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 0 0% 100%;

            --border: 0 0% 20%;
            --input: 0 0% 20%;
            --ring: 0 85% 50%;

            --radius: 0.5rem;

            --sidebar-background: 0 0% 6%;
            --sidebar-foreground: 0 0% 80%;
            --sidebar-primary: 0 85% 50%;
            --sidebar-primary-foreground: 0 0% 100%;
            --sidebar-accent: 0 0% 14%;
            --sidebar-accent-foreground: 0 0% 95%;
            --sidebar-border: 0 0% 15%;
            --sidebar-ring: 0 85% 50%;

            --progress-bar: 210 100% 55%;
            --hero-gradient: linear-gradient(to top, hsl(0 0% 8%) 0%, transparent 60%);
            --card-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
          }
        }

        @layer base {
          * {
            @apply border-border;
          }

          body {
            @apply bg-background text-foreground font-sans;
            font-family: 'Inter', sans-serif;
          }

          h1, h2, h3, .font-display {
            font-family: 'Bebas Neue', sans-serif;
          }

          /* Scrollbar */
          ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
          }
          ::-webkit-scrollbar-track {
            background: hsl(var(--background));
          }
          ::-webkit-scrollbar-thumb {
            background: hsl(var(--muted));
            border-radius: 3px;
          }
        }

        @layer components {
          .movie-card {
            @apply relative rounded-md overflow-hidden cursor-pointer transition-all duration-300 ease-out;
          }
          .movie-card:hover {
            transform: scale(1.2);
            z-index: 30;
            box-shadow: var(--card-shadow);
          }
          .movie-card:hover .movie-card-info {
            @apply opacity-100 translate-y-0;
          }
          .movie-card-info {
            @apply absolute bottom-0 left-0 right-0 p-3 opacity-0 translate-y-2 transition-all duration-300;
            background: linear-gradient(to top, hsl(0 0% 5% / 0.95), transparent);
          }

          .sidebar-nav {
            @apply transition-all duration-300 ease-in-out;
          }

          .category-row {
            @apply flex gap-2 overflow-x-auto pb-4;
            -ms-overflow-style: none;
            scrollbar-width: none;
          }
          .category-row::-webkit-scrollbar {
            display: none;
          }

          .menu-tile {
            @apply relative rounded-lg overflow-hidden cursor-pointer transition-transform duration-300;
          }
          .menu-tile:hover {
            transform: scale(1.05);
          }
        }
    </style>
</head>
