<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PaixãoFlix Pro Max</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    
    <style>
        :root {
            /* Paleta HBO Max Official */
            --hbo-purple: #1f003a;
            --hbo-gradient: linear-gradient(45deg, #51009e, #1f003a);
            --hbo-bg: #000000;
            --hbo-accent: #9d3dff;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --font-main: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--hbo-bg);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow-x: hidden;
            user-select: none;
        }

        /* BARRA LATERAL (SMART TV STYLE) */
        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 80px;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            z-index: 1000;
            transition: width 0.3s;
        }

        #sidebar:hover, #sidebar.active { width: 220px; background: black; }

        .nav-item {
            width: 100%;
            padding: 20px;
            display: flex;
            align-items: center;
            color: var(--text-dim);
            text-decoration: none;
            cursor: pointer;
            border-left: 4px solid transparent;
        }

        .nav-item i { font-size: 1.5rem; min-width: 40px; text-align: center; }
        .nav-item span { margin-left: 20px; opacity: 0; transition: 0.3s; white-space: nowrap; }
        #sidebar:hover span { opacity: 1; }

        .nav-item.active, .nav-item:focus {
            color: white;
            background: rgba(157, 61, 255, 0.2);
            border-left-color: var(--hbo-accent);
        }

        /* CONTEÚDO PRINCIPAL */
        #main-content { margin-left: 80px; padding: 0; transition: margin 0.3s; }

        /* HERO SECTION */
        #hero {
            height: 80vh;
            width: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 60px;
            background-image: linear-gradient(to top, var(--hbo-bg), transparent 50%), url('https://raw.githubusercontent.com/VisorFinances/lista-paixaoflix/refs/heads/main/hero_bg.jpg');
        }

        .hero-info h1 { font-size: 4rem; margin-bottom: 10px; }
        .hero-btns { display: flex; gap: 15px; margin-top: 20px; }

        .btn {
            padding: 12px 30px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
        }
        .btn-white { background: white; color: black; }
        .btn-gray { background: rgba(255,255,255,0.2); color: white; }
        .btn:focus { transform: scale(1.1); outline: 3px solid white; }

        /* LINHAS DE CONTEÚDO */
        .content-section { padding: 20px 0 20px 60px; }
        .section-title { font-size: 1.5rem; margin-bottom: 15px; color: var(--text-dim); }
        .movie-row {
    display: flex; /* Isso coloca um filme do lado do outro */
    overflow-x: auto; /* Permite que a linha cresça para o lado */
    padding: 20px;
    gap: 15px;
}

        /* Estilo Disney+ Cards */
.movie-card {
    min-width: 200px;
    aspect-ratio: 2/3; /* Formato vertical de poster */
    background: #1a1a1a;
    border-radius: 8px; /* Cantos arredondados */
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease, border 0.3s ease;
    position: relative;
    overflow: hidden;
    border: 3px solid transparent; /* Borda invisível para não saltar quando focar */
}

/* Efeito de Foco (Controle Remoto) Estilo Disney+ */
.movie-card:focus {
    transform: scale(1.08); /* Zoom suave */
    border-color: #f9f9f9; /* Borda clara brilhante */
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
    z-index: 10;
    outline: none;
}

/* Overlay sutil no card */
.movie-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 5px;
}
        
        /* PLAYER OVERLAY */
        #video-player {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 2000;
            display: none;
        }
        #video-player.active { display: block; }

        /* BUSCA POR VOZ ANIMATION */
        #voice-search-btn.recording {
            background: #ea4335;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(234, 67, 53, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0); }
        }

        /* PARENTAL MODAL */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex; align-items: center; justify-content: center;
            z-index: 3000; visibility: hidden;
        }
        .modal.active { visibility: visible; }
        .modal-card { background: #1a1a1a; padding: 40px; border-radius: 8px; text-align: center; max-width: 400px; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <a class="nav-item focusable active" data-page="home"><i class="fas fa-home"></i><span>Início</span></a>
        <a class="nav-item focusable" data-page="search"><i class="fas fa-search"></i><span>Busca</span></a>
        <a class="nav-item focusable" data-page="cinema"><i class="fas fa-film"></i><span>Filmes</span></a>
        <a class="nav-item focusable" data-page="series"><i class="fas fa-tv"></i><span>Séries</span></a>
        <a class="nav-item focusable" data-page="live"><i class="fas fa-broadcast-tower"></i><span>Canais</span></a>
        <a class="nav-item focusable" data-page="kids"><i class="fas fa-child"></i><span>Kids</span></a>
        <a class="nav-item focusable" style="margin-top: auto;" onclick="app.showSettings()"><i class="fas fa-cog"></i><span>Configurações</span></a>
    </nav>

    <main id="main-content">
        <section id="hero">
            <div class="hero-info">
                <img src="https://raw.githubusercontent.com/VisorFinances/lista-paixaoflix/refs/heads/main/logo_white.png" height="50">
                <h1>PaixãoFlix Original</h1>
                <p>O melhor do cinema e das séries exclusivas, organizado para sua Smart TV.</p>
                <div class="hero-btns">
                    <button class="btn btn-white focusable" onclick="app.playFeatured()"><i class="fas fa-play"></i> Assistir Agora</button>
                    <button class="btn btn-gray focusable" onclick="app.showFeaturedInfo()"><i class="fas fa-info-circle"></i> Mais Informações</button>
                </div>
            </div>
        </section>

        <div class="content-section" id="continue-section">
            <h2 class="section-title">Continuar Assistindo</h2>
            <div class="movie-row" id="continue-watching-row"></div>
        </div>

        <div class="content-section">
            <h2 class="section-title">Melhores de 2025</h2>
            <div class="movie-row" id="melhores-2025-row"></div>
        </div>

        <div class="content-section">
            <h2 class="section-title">Séries Favoritas (PaixãoFlix)</h2>
            <div class="movie-row" id="prepare-pipoca-row"></div>
        </div>
    </main>

    <div id="search-overlay" class="modal">
        <div class="modal-card" style="max-width: 80%;">
            <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 30px;">
                <input type="text" id="search-input" placeholder="Filme, Ano ou Gênero..." 
                       style="flex:1; padding: 15px; background: #333; border: none; color: white; font-size: 1.5rem;">
                <button id="voice-search-btn" class="focusable" onclick="app.startVoiceSearch()" 
                        style="width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer;">
                    <i class="fas fa-microphone"></i>
                </button>
            </div>
            <div class="movie-row" id="search-grid" style="flex-wrap: wrap; justify-content: center;"></div>
        </div>
    </div>

    <div id="video-player">
        <div id="clappr-player" style="width: 100%; height: 100%;"></div>
        <button onclick="app.closePlayer()" style="position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.5); color: white; border: none; padding: 10px; cursor: pointer;">
            <i class="fas fa-arrow-left"></i> Voltar
        </button>
    </div>

    <script src="paixaoflix.js"></script>
    <script>
        // Injeção do Favicon Dinâmico conforme solicitado
        const link = document.createElement('link');
        link.type = 'image/png';
        link.rel = 'shortcut icon';
        link.href = 'https://raw.githubusercontent.com/VisorFinances/lista-paixaoflix/refs/heads/main/logo192.png';
        document.getElementsByTagName('head')[0].appendChild(link);
    </script>
</body>
</html>
