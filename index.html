<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaixãoFlix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Sidebar Fixa */
        #sidebar { 
            position: fixed; left: 0; top: 0; bottom: 0; width: 80px; 
            background: #050505; display: flex; flex-direction: column; z-index: 1000; 
        }
        .nav-item { padding: 20px; color: #fff; text-align: center; font-size: 1.5rem; cursor: pointer; }
        
        /* Hero Destaque */
        #hero { 
            height: 80vh; background-size: cover; background-position: center; 
            display: flex; align-items: flex-end; padding: 100px; 
        }

        /* Ajuste de Zoom para não cortar na lateral */
        .content-section { padding: 40px 0 20px 100px; }
        .category-title { font-size: 1.8rem; margin-bottom: 15px; }
        
        .movie-row { display: flex; overflow-x: auto; gap: 20px; padding: 20px 0; }
        .movie-card { 
            min-width: 200px; height: 300px; background: #222; 
            cursor: pointer; transition: transform 0.3s; 
        }
        .movie-card:focus { transform: scale(1.1); outline: 4px solid #fff; z-index: 10; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }

        /* Player e Barra de Canais */
        #video-player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3000; background: #000; }
        .channels-sidebar { 
            position: absolute; left: 0; top: 0; width: 300px; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 3005; transform: translateX(-100%); 
            transition: 0.3s; 
        }
        .channels-sidebar.active { transform: translateX(0); }
        .channel-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .channel-item:focus { background: #333; outline: 2px solid #fff; }

        /* Botões 3D */
        .btn-3d { 
            padding: 15px 30px; font-weight: bold; cursor: pointer; 
            border: none; background: #fff; color: #000; 
            box-shadow: 0 5px 0 #888; margin-right: 10px;
        }
        .btn-3d:active { transform: translateY(3px); box-shadow: none; }

        /* Detalhes */
        #movie-details { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 2000; background: #000; 
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="nav-item focusable" onclick="mostrarHome()"><i class="fas fa-home"></i></div>
        <div class="nav-item focusable" onclick="carregarFilmes()"><i class="fas fa-film"></i></div>
        <div class="nav-item focusable" onclick="carregarTvAoVivo()"><i class="fas fa-satellite-dish"></i></div>
    </nav>

    <div id="main-content">
        <section id="hero" style="background-image: url('https://image.tmdb.org/t/p/original/mBaXZ95O2vS7S961db60SOT0Iuo.jpg');">
            <div>
                <h1 style="font-size: 3rem;">Destaque PaixãoFlix</h1>
                <button class="btn-3d focusable">ASSISTIR AGORA</button>
            </div>
        </section>

        <div id="catalog-rows">
            <div class="content-section">
                <h2 class="category-title">Lançamento 2026</h2>
                <div class="movie-row" id="row-2026">
                    </div>
            </div>
            
            <div class="content-section">
                <h2 class="category-title">Lançamento 2025</h2>
                <div class="movie-row" id="row-2025"></div>
            </div>

            <div class="content-section"><h2 class="category-title">Ação</h2><div class="movie-row" id="row-Acao"></div></div>
            <div class="content-section"><h2 class="category-title">Aventura</h2><div class="movie-row" id="row-Aventura"></div></div>
        </div>
    </div>

    <div id="video-player">
        <div id="clappr-player" style="width:100%; height:100%;"></div>
        <div id="live-channels-list" class="channels-sidebar">
            <h2 style="padding: 20px;">Canais</h2>
            <div id="channels-container"></div>
        </div>
        <button id="btn-close-player" class="btn-3d focusable" onclick="fecharPlayer()" style="position:fixed; top:20px; right:20px; z-index:4000;">SAIR</button>
    </div>

    <div id="movie-details">
        <div id="det-backdrop" style="width:100%; height:100%; background-size:cover; padding:100px;">
            <div style="background:rgba(0,0,0,0.7); padding:40px; border-radius:10px; max-width:800px;">
                <h1 id="det-title"></h1>
                <p id="det-overview"></p>
                <div style="display:flex; gap:10px;">
                    <button id="btn-play-now" class="btn-3d focusable">PLAY</button>
                    <button id="btn-trailer" class="btn-3d focusable">TRAILER</button>
                    <button class="btn-3d focusable" onclick="fecharDetalhes()">VOLTAR</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="paixaoflix.js"></script>
</body>
</html>
