<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaixãoFlix - Streaming Premium</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header com Navegação -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <h1>PaixãoFlix</h1>
            </div>
            <nav class="nav-menu">
                <ul class="nav-list">
                    <li><a href="#" class="nav-link active" data-section="home">Início</a></li>
                    <li><a href="#" class="nav-link" data-section="search">Buscar</a></li>
                    <li><a href="#" class="nav-link" data-section="watchlist">Minha Lista</a></li>
                </ul>
            </nav>
            <div class="user-menu">
                <button class="user-avatar">
                    <img src="https://via.placeholder.com/32x32" alt="Usuário">
                </button>
            </div>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="main-content">
        <!-- Hero Banner -->
        <section class="hero-banner" id="heroBanner">
            <div class="hero-content">
                <h1 class="hero-title" id="heroTitle">Carregando...</h1>
                <p class="hero-description" id="heroDescription">Carregando...</p>
                <div class="hero-buttons">
                    <button class="btn btn-primary" id="playBtn">
                        <span class="btn-icon">▶</span>
                        Assistir
                    </button>
                    <button class="btn btn-secondary" id="infoBtn">
                        <span class="btn-icon">ℹ</span>
                        Mais Informações
                    </button>
                </div>
            </div>
            <div class="hero-backdrop" id="heroBackdrop"></div>
        </section>

        <!-- Brands Section -->
        <section class="brands-section">
            <div class="brands-container">
                <button class="brand-btn active" data-brand="all">
                    <span>Todos</span>
                </button>
                <button class="brand-btn" data-brand="disney">
                    <span>Disney</span>
                </button>
                <button class="brand-btn" data-brand="pixar">
                    <span>Pixar</span>
                </button>
                <button class="brand-btn" data-brand="marvel">
                    <span>Marvel</span>
                </button>
                <button class="brand-btn" data-brand="starwars">
                    <span>Star Wars</span>
                </button>
                <button class="brand-btn" data-brand="national">
                    <span>National Geographic</span>
                </button>
            </div>
        </section>

        <!-- Content Rows -->
        <section class="content-section">
            <div class="content-rows" id="contentRows">
                <!-- As fileiras serão geradas dinamicamente -->
            </div>
        </section>
    </main>

    <!-- Modal de Detalhes -->
    <div class="modal-overlay" id="detailsModal">
        <div class="modal-content details-modal">
            <button class="modal-close" id="closeModal">&times;</button>
            <div class="details-container">
                <div class="details-poster">
                    <img id="detailsPoster" src="" alt="">
                </div>
                <div class="details-info">
                    <h2 id="detailsTitle"></h2>
                    <div class="details-meta">
                        <span class="year" id="detailsYear"></span>
                        <span class="rating" id="detailsRating"></span>
                        <span class="genre-badge" id="detailsGenre"></span>
                    </div>
                    <p class="description" id="detailsDescription"></p>
                    <div class="details-actions">
                        <button class="btn btn-primary" id="detailsPlayBtn">
                            <span>▶</span> Assistir
                        </button>
                        <button class="btn btn-secondary" id="detailsTrailerBtn">
                            <span>▶</span> Trailer
                        </button>
                        <button class="btn btn-outline" id="detailsAddToListBtn">
                            <span>+</span> Minha Lista
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Trailer -->
    <div class="modal-overlay" id="trailerModal">
        <div class="modal-content trailer-modal">
            <button class="modal-close" id="closeTrailerModal">&times;</button>
            <div class="trailer-container">
                <iframe id="trailerPlayer" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <!-- Player Container -->
    <div class="player-overlay" id="playerOverlay">
        <div class="player-container">
            <button class="player-close" id="closePlayer">&times;</button>
            <div id="videoPlayer"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
