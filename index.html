<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Carregamento - PaixãoFlix</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
        }
        .test-section {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .success { background: #28a745; }
        .error { background: #dc3545; }
        .warning { background: #ffc107; color: #000; }
        .info { background: #17a2b8; }
        h1 { color: #ffc107; text-align: center; }
        .btn {
            background: #ffc107;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        .btn:hover { background: #ff6b6b; }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: #ffc107;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <h1>🧪 Teste de Carregamento - PaixãoFlix</h1>
    
    <div class="test-section">
        <h2>📁 Teste de Arquivos</h2>
        <div id="file-status" class="status info">Aguardando teste...</div>
        <button class="btn" onclick="testFiles()">Testar Arquivos</button>
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
        </div>
        <div id="file-results"></div>
    </div>
    
    <div class="test-section">
        <h2>🌐 Teste de Conectividade</h2>
        <div id="network-status" class="status info">Aguardando teste...</div>
        <button class="btn" onclick="testNetwork()">Testar Rede</button>
        <button class="btn" onclick="testGitHub()">Testar GitHub</button>
    </div>
    
    <div class="test-section">
        <h2>🚀 Teste de Inicialização</h2>
        <div id="init-status" class="status info">Aguardando teste...</div>
        <button class="btn" onclick="testInit()">Testar Init</button>
        <button class="btn" onclick="testSplash()">Testar Splash</button>
    </div>
    
    <script>
        const baseURL = 'https://raw.githubusercontent.com/paixaoflix-mobile/paixaoflix-mobile/main/';
        
        async function testFiles() {
            const status = document.getElementById('file-status');
            const progressFill = document.getElementById('progress-fill');
            const results = document.getElementById('file-results');
            
            status.className = 'status info';
            status.innerHTML = '🔄 Testando arquivos...';
            results.innerHTML = '';
            
            const arquivos = [
                'data/filmes.json', 
                'data/series.json', 
                'data/ativa_canais.m3u', 
                'data/kids_filmes.json',
                'data/kids_series.json',
                'data/kids_canais.m3u'
            ];
            
            let carregados = 0;
            let successCount = 0;
            let errorCount = 0;
            
            try {
                for (const arquivo of arquivos) {
                    try {
                        const startTime = Date.now();
                        const response = await fetch(baseURL + arquivo);
                        const endTime = Date.now();
                        const loadTime = endTime - startTime;
                        
                        if (response.ok) {
                            successCount++;
                            results.innerHTML += `
                                <div style="color: #28a745; margin: 5px 0;">
                                    ✅ ${arquivo} - ${loadTime}ms - ${response.status}
                                </div>
                            `;
                        } else {
                            errorCount++;
                            results.innerHTML += `
                                <div style="color: #dc3545; margin: 5px 0;">
                                    ❌ ${arquivo} - ${response.status} ${response.statusText}
                                </div>
                            `;
                        }
                    } catch (error) {
                        errorCount++;
                        results.innerHTML += `
                            <div style="color: #dc3545; margin: 5px 0;">
                                ❌ ${arquivo} - ${error.message}
                            </div>
                        `;
                    }
                    
                    carregados++;
                    const progress = (carregados / arquivos.length) * 100;
                    progressFill.style.width = `${progress}%`;
                }
                
                status.className = successCount === arquivos.length ? 'status success' : 'status warning';
                status.innerHTML = `✅ Teste concluído: ${successCount}/${arquivos.length} arquivos carregados`;
                
            } catch (error) {
                status.className = 'status error';
                status.innerHTML = `❌ Erro no teste: ${error.message}`;
            }
        }
        
        async function testNetwork() {
            const status = document.getElementById('network-status');
            
            if (navigator.onLine) {
                status.className = 'status success';
                status.innerHTML = '✅ Conectado à internet';
            } else {
                status.className = 'status error';
                status.innerHTML = '❌ Modo offline';
            }
        }
        
        async function testGitHub() {
            const status = document.getElementById('network-status');
            
            try {
                const response = await fetch(baseURL);
                if (response.ok) {
                    status.className = 'status success';
                    status.innerHTML = `✅ GitHub acessível - ${response.status}`;
                } else {
                    status.className = 'status error';
                    status.innerHTML = `❌ GitHub erro - ${response.status}`;
                }
            } catch (error) {
                status.className = 'status error';
                status.innerHTML = `❌ GitHub falha: ${error.message}`;
            }
        }
        
        async function testInit() {
            const status = document.getElementById('init-status');
            
            try {
                // Simular inicialização básica
                console.log('🧪 Iniciando teste de inicialização...');
                
                // Testar se os elementos existiriam
                const mockSplash = document.createElement('div');
                mockSplash.id = 'splash-screen';
                mockSplash.style.display = 'none';
                document.body.appendChild(mockSplash);
                
                const mockBar = document.createElement('div');
                mockBar.className = 'loader-progress';
                mockBar.style.display = 'none';
                document.body.appendChild(mockBar);
                
                // Verificar se foram encontrados
                const splash = document.getElementById('splash-screen');
                const bar = document.querySelector('.loader-progress');
                
                if (splash && bar) {
                    status.className = 'status success';
                    status.innerHTML = '✅ Elementos da splash screen encontrados';
                } else {
                    status.className = 'status error';
                    status.innerHTML = '❌ Elementos da splash screen não encontrados';
                }
                
                // Limpar elementos de teste
                mockSplash.remove();
                mockBar.remove();
                
            } catch (error) {
                status.className = 'status error';
                status.innerHTML = `❌ Erro no teste: ${error.message}`;
            }
        }
        
        async function testSplash() {
            const status = document.getElementById('init-status');
            
            // Criar splash screen de teste
            const splash = document.createElement('div');
            splash.id = 'test-splash-screen';
            splash.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: #0a0a0a;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 9999;
            `;
            
            splash.innerHTML = `
                <div style="color: #ffc107; font-size: 24px; margin-bottom: 20px;">
                    🎬 Teste Splash Screen
                </div>
                <div style="width: 300px; height: 4px; background: #333; border-radius: 2px;">
                    <div style="width: 0%; height: 100%; background: #ffc107; border-radius: 2px; transition: width 0.3s;" id="test-progress"></div>
                </div>
            `;
            
            document.body.appendChild(splash);
            
            // Simular progresso
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                document.getElementById('test-progress').style.width = `${progress}%`;
                
                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        splash.style.opacity = '0';
                        setTimeout(() => splash.remove(), 500);
                        status.className = 'status success';
                        status.innerHTML = '✅ Splash screen testada com sucesso!';
                    }, 500);
                }
            }, 200);
            
            status.className = 'status info';
            status.innerHTML = '🔄 Testando splash screen...';
        }
        
        // Testes automáticos ao carregar
        window.addEventListener('load', () => {
            testNetwork();
            testGitHub();
        });
    </script>
</body>
</html>
