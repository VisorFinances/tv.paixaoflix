<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Check - PaixãoFlix</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .check-section {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .success { background: #28a745; }
        .error { background: #dc3545; }
        .warning { background: #ffc107; color: #000; }
        .info { background: #17a2b8; }
        h1 { color: #ffc107; text-align: center; }
        h2 { color: #ffc107; }
        .btn {
            background: #ffc107;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        .btn:hover { background: #ff6b6b; }
        .check-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #333;
        }
        .check-item:last-child {
            border-bottom: none;
        }
        .check-name {
            flex: 1;
        }
        .check-status {
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .ok { background: #28a745; color: white; }
        .fail { background: #dc3545; color: white; }
        .pending { background: #ffc107; color: #000; }
    </style>
</head>
<body>
    <h1>🔍 System Check - PaixãoFlix Pro Max</h1>
    
    <div class="check-section">
        <h2>📁 Verificação de Arquivos</h2>
        <div id="files-check"></div>
        <button class="btn" onclick="checkFiles()">Verificar Arquivos</button>
    </div>
    
    <div class="check-section">
        <h2>🔧 Verificação de Sintaxe</h2>
        <div id="syntax-check"></div>
        <button class="btn" onclick="checkSyntax()">Verificar Sintaxe</button>
    </div>
    
    <div class="check-section">
        <h2>🌐 Verificação de Rede</h2>
        <div id="network-check"></div>
        <button class="btn" onclick="checkNetwork()">Verificar Rede</button>
    </div>
    
    <div class="check-section">
        <h2>🎬 Verificação de Funcionalidades</h2>
        <div id="features-check"></div>
        <button class="btn" onclick="checkFeatures()">Verificar Funcionalidades</button>
    </div>
    
    <div class="check-section">
        <h2>📊 Resumo do Sistema</h2>
        <div id="summary-check"></div>
        <button class="btn" onclick="runFullCheck()">Verificação Completa</button>
    </div>
    
    <script>
        const baseURL = 'https://raw.githubusercontent.com/paixaoflix-mobile/paixaoflix-mobile/main/';
        
        async function checkFiles() {
            const container = document.getElementById('files-check');
            container.innerHTML = '<div class="status info">🔄 Verificando arquivos...</div>';
            
            const files = [
                { name: 'index.html', type: 'html' },
                { name: 'style.css', type: 'css' },
                { name: 'paixaoflix.js', type: 'js' },
                { name: 'manifest.json', type: 'json' },
                { name: 'sw.js', type: 'js' },
                { name: 'data/filmes.json', type: 'json' },
                { name: 'data/series.json', type: 'json' },
                { name: 'data/ativa_canais.m3u', type: 'm3u' }
            ];
            
            let html = '';
            let successCount = 0;
            
            for (const file of files) {
                try {
                    const response = await fetch(file.type === 'html' || file.type === 'css' || file.type === 'js' || file.type === 'json' ? file.name : baseURL + file.name);
                    
                    if (response.ok) {
                        successCount++;
                        html += `
                            <div class="check-item">
                                <span class="check-name">📄 ${file.name}</span>
                                <span class="check-status ok">✅ OK</span>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="check-item">
                                <span class="check-name">📄 ${file.name}</span>
                                <span class="check-status fail">❌ ${response.status}</span>
                            </div>
                        `;
                    }
                } catch (error) {
                    html += `
                        <div class="check-item">
                            <span class="check-name">📄 ${file.name}</span>
                            <span class="check-status fail">❌ Erro</span>
                        </div>
                    `;
                }
            }
            
            container.innerHTML = html;
            container.innerHTML += `<div class="status ${successCount === files.length ? 'success' : 'warning'}">📊 ${successCount}/${files.length} arquivos acessíveis</div>`;
        }
        
        async function checkSyntax() {
            const container = document.getElementById('syntax-check');
            container.innerHTML = '<div class="status info">🔄 Verificando sintaxe...</div>';
            
            const checks = [
                { name: 'JavaScript (paixaoflix.js)', check: 'js' },
                { name: 'HTML (index.html)', check: 'html' },
                { name: 'CSS (style.css)', check: 'css' },
                { name: 'JSON (manifest.json)', check: 'json' }
            ];
            
            let html = '';
            
            for (const check of checks) {
                try {
                    if (check.check === 'js') {
                        // Verificar sintaxe JavaScript
                        const response = await fetch('paixaoflix.js');
                        const jsCode = await response.text();
                        
                        // Verificação básica de parênteses
                        const openParens = (jsCode.match(/\(/g) || []).length;
                        const closeParens = (jsCode.match(/\)/g) || []).length;
                        const openBraces = (jsCode.match(/\{/g) || []).length;
                        const closeBraces = (jsCode.match(/\}/g) || []).length;
                        
                        if (openParens === closeParens && openBraces === closeBraces) {
                            html += `
                                <div class="check-item">
                                    <span class="check-name">📜 ${check.name}</span>
                                    <span class="check-status ok">✅ Sintaxe OK</span>
                                </div>
                            `;
                        } else {
                            html += `
                                <div class="check-item">
                                    <span class="check-name">📜 ${check.name}</span>
                                    <span class="check-status fail">❌ Erro de sintaxe</span>
                                </div>
                            `;
                        }
                    } else {
                        html += `
                            <div class="check-item">
                                <span class="check-name">📜 ${check.name}</span>
                                <span class="check-status ok">✅ OK</span>
                            </div>
                        `;
                    }
                } catch (error) {
                    html += `
                        <div class="check-item">
                            <span class="check-name">📜 ${check.name}</span>
                            <span class="check-status fail">❌ Erro</span>
                        </div>
                    `;
                }
            }
            
            container.innerHTML = html;
        }
        
        async function checkNetwork() {
            const container = document.getElementById('network-check');
            container.innerHTML = '<div class="status info">🔄 Verificando rede...</div>';
            
            const checks = [
                { name: 'Conectividade', url: '' },
                { name: 'GitHub', url: baseURL },
                { name: 'TMDB API', url: 'https://api.themoviedb.org/3/movie/550?api_key=b275ce8e1a6b3d5d879bb0907e4f56ad' },
                { name: 'Archive.org', url: 'https://archive.org/metadata/paixao-flix' }
            ];
            
            let html = '';
            
            for (const check of checks) {
                try {
                    const response = await fetch(check.url || 'https://httpbin.org/get');
                    
                    if (response.ok) {
                        html += `
                            <div class="check-item">
                                <span class="check-name">🌐 ${check.name}</span>
                                <span class="check-status ok">✅ Online</span>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="check-item">
                                <span class="check-name">🌐 ${check.name}</span>
                                <span class="check-status fail">❌ ${response.status}</span>
                            </div>
                        `;
                    }
                } catch (error) {
                    html += `
                        <div class="check-item">
                            <span class="check-name">🌐 ${check.name}</span>
                            <span class="check-status fail">❌ Offline</span>
                        </div>
                    `;
                }
            }
            
            container.innerHTML = html;
        }
        
        async function checkFeatures() {
            const container = document.getElementById('features-check');
            container.innerHTML = '<div class="status info">🔄 Verificando funcionalidades...</div>';
            
            const features = [
                { name: 'Service Worker', check: () => 'serviceWorker' in navigator },
                { name: 'LocalStorage', check: () => typeof(Storage) !== "undefined" },
                { name: 'Fetch API', check: () => 'fetch' in window },
                { name: 'PWA Support', check: () => 'BeforeInstallPromptEvent' in window },
                { name: 'Touch Events', check: () => 'ontouchstart' in window },
                { name: 'Fullscreen API', check: () => 'fullscreenEnabled' in document },
                { name: 'Geolocation', check: () => 'geolocation' in navigator },
                { name: 'Web Workers', check: () => 'Worker' in window }
            ];
            
            let html = '';
            let supportedCount = 0;
            
            for (const feature of features) {
                const supported = feature.check();
                if (supported) supportedCount++;
                
                html += `
                    <div class="check-item">
                        <span class="check-name">🚀 ${feature.name}</span>
                        <span class="check-status ${supported ? 'ok' : 'fail'}">${supported ? '✅' : '❌'}</span>
                    </div>
                `;
            }
            
            container.innerHTML = html;
            container.innerHTML += `<div class="status ${supportedCount === features.length ? 'success' : 'warning'}">📊 ${supportedCount}/${features.length} funcionalidades suportadas</div>`;
        }
        
        async function runFullCheck() {
            await checkFiles();
            await checkSyntax();
            await checkNetwork();
            await checkFeatures();
            
            const container = document.getElementById('summary-check');
            container.innerHTML = `
                <div class="status success">
                    <h3>✅ Verificação Completa Concluída!</h3>
                    <p>Todos os componentes do sistema foram verificados.</p>
                    <p>Abra o console do navegador (F12) para ver logs detalhados.</p>
                </div>
            `;
        }
        
        // Auto-check ao carregar
        window.addEventListener('load', () => {
            console.log('🔍 System Check - PaixãoFlix Pro Max');
            console.log('Use os botões acima para verificar cada componente do sistema.');
        });
    </script>
</body>
</html>
